name: API Diff

on:
  pull_request:
    paths:
      - "examples/fixtures/**"
      - "packages/**"

jobs:
  api-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Run API Diff Action
        uses: ./packages/github-action
        with:
          baseline: examples/fixtures/baseline-users.json
          candidate: examples/fixtures/candidate-users.json
          config: examples/api-diff.config.json
          title: "Breaking API Changes Detected in /v1/users"
          fail-on: never
          comment: "true"
