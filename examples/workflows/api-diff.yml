name: ContractGuard

on:
  pull_request:
    paths:
      - "examples/fixtures/**"
      - "packages/**"

jobs:
  contractguard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # version comes from package.json "packageManager" (pnpm@9.15.0)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Run ContractGuard Action
        uses: ./packages/github-action
        with:
          baseline: examples/fixtures/baseline-users.json
          candidate: examples/fixtures/candidate-users.json
          config: examples/contractguard.config.json
          title: "Breaking API Changes Detected in /v1/users"
          fail-on: never
          comment: "true"
